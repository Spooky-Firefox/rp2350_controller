# OpenOCD Configuration for RP2350

# Adapter interface - adjust based on your debug probe
# Options: jlink, ftdi, cmsis-dap, raspberrypi-swd, etc.
adapter driver cmsis-dap

# Adapter speed (kHz)
adapter speed 5000

# Transport protocol
transport select swd

# Target configuration for RP2350
source [find target/rp2350.cfg]

# GDB options
gdb_port 3333
tcl_port 6666
telnet_port 4444

# Reset handling
reset_config srst_only srst_push_pull

# Optional: Halt on reset
# init
# reset halt
